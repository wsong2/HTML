<!DOCTYPE html>
<html>
<head><title>Quick Test</title>
<meta http-equiv="content-type" content="text/html; charset=UTF-16">
</head>
<body>
<script>
function checkDttm(form)
{
	var txt = form.dttm.value;
	if (/^\s+$/.test(txt))
	{
		alert('empty');
		return;
	}
	
	var dayexp = RegExp('day\\-\\d+','g');
	if (dayexp.test(txt))
	{
		alert('DAY');
		return;
	}

	var dttmexp = RegExp('\\d{4}\\-\\d{1,2}\\-\\d{1,2}(\\s+\\d{1,2}:\\d{1,2})?');
	if (dttmexp.test(txt))
	{
		alert('ymd');
		return;
	}
	
	alert('clicked');
}
</script>
<div>
<form>
<input name="dttm" type="text">
<input value="1986-06-23" type="date">
<input value="Run" type="button" onClick="checkDttm(this.form)">
</form>
</div>
</body></html>
