<script type="text/javascript">
function doXmlParse()
{
	var xml = $("#taXML").text();
	var xmlDoc = $.parseXML(xml);
	$xml = $(xmlDoc);
	$title = $xml.find("title");
	$("#Description").text($title.text());
}
</script>
