<!DOCTYPE html>
<html><meta charset="UTF-8">
<head><title>One Page</title>
<style>
button.footer {
	background-color: Transparent;
	background-repeat:no-repeat;
	border: none;
	cursor:pointer;
	overflow: hidden;
	outline:none;
	font-weight : bold;
}
</style>
</head>
<body onload="populateTBodys('idTbForm', 'idTbGrid')">
<form>
<table><tbody id="idTbForm">
<tr><td/><td>ID</td><td><span id="id0"></span></td></tr>
<!-- insert here -->
<tr><td/><td><button onclick="postForm(this, this.form)">Submit</button></td><td/></tr>
</tbody></table>
</form>
<hr/>
<table>
<thead><tr>
 <th/><th>Id</th><th>Name</th><th>Date</th><th>Category</th><th>Unit</th><th>Price</th><th>Description</th><th>Timestamp</th>
</tr></thead>
<tbody id="idTbGrid"><!-- insert here --></tbody>
<tfoot><tr>
 <td/><td colspan="2"><button class="footer" onclick="loadGridData(this)">Load</button></td><td colspan="3"/><td>
 <td><button class="footer" onclick="showValue('rsel')">Prev</button></td>
 <td><button class="footer" onclick="showValue('rsel')">Next</button></td>
</tr></tfoot>
</table>
<script src="pagedata.js"></script>
<script src="onepage.js"></script>
<script>
function populateTBodys(idTBodyForm, idTBodyGrid)
{
	let tbodyForm = document.getElementById(idTBodyForm);
	insertFormTBodyRow(tbodyForm, 1, 'Name', 'simName', 'text');
	insertFormTBodyRow(tbodyForm, 2, 'Category', 'categ', 'text');
	insertFormTBodyRow(tbodyForm, 3, 'Description', 'descr', 'text');
	insertFormTBodyRow(tbodyForm, 4, 'Date', 'simDate', 'date');
	insertFormTBodyPriceRow(tbodyForm, 5, 'Price', 'unity', 'price')
	insertFormTBodyRow(tbodyForm, 6, 'Time stamp', 'dttm', 'datetime-local');

	populateTBody(idTBodyGrid, 'rsel');	
}
</script>
</body>
</html>
