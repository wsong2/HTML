<HTML><HEAD><TITLE>Simple JScript</TITLE>
<META content="text/html; charset=UTF-8" http-equiv=Content-Type>
<SCRIPT type=text/javascript>
function doRequest()
{
	var txtIn = document.getElementsByTagName("input")[0].value;
	var res = decodeURIComponent(txtIn);
	var ta = document.getElementsByTagName("textarea")[0];
		
	var lines = new Array(
		"int nInst = 987;",
		"wsInstRec.setInstanceNo(nInst);"
	);
	ta.value = res + "\n" + testArgs2(lines, "23", 45);
}

function testArgs()
{	
	var args = Array.prototype.slice.call(arguments);
	var lines = args[0];
	var ret = "";
	for (var i=0; i<lines.length; i++)
		ret += lines[i] + "\n";
	return ret + "\n" + args[1] + "~" + args[2];
}

function testArgs2(lines, ...args)
{	
	var ret = "";
	for (var i=0; i<lines.length; i++)
		ret += lines[i] + "\n";
	return ret + "\n" + args.join("~");
}
</SCRIPT>
<STYLE type=text/css>
DIV.main	{ WIDTH: 52em; }
DIV.fst 	{ TEXT-ALIGN: center; BORDER: grey 1px solid; }
</STYLE>
</HEAD>
<BODY><DIV class="main">
<div class="fst"><form>
	<h2>Input</h2>
	<input maxLength=30 size=30 name="keywd" title="Title">&nbsp;
	<input onclick="doRequest()" value="Execute" type="button">
	</form></div>
<table style="width:100%">
	<tr><th>A</th><th>&#x29D98;&#8217;</th><th>C</th></tr>
</table> 
<textarea rows="3" cols="100">
</textarea>
</DIV></BODY></HTML>
