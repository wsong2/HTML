<html>
<head><title>GIT Memo</title>
<META content="text/html; charset=UTF-8" http-equiv=Content-Type>

<script type=text/javascript>
function showPRE(preId)
{
	var pres  = document.getElementsByTagName("pre");
	for (var i=0; i<pres.length; i++)
	{
		pres[i].className = (pres[i].id===preId) ? "show" : "hidden";
	}
}
</script>

<style type=text/css>
A 			{ text-decoration: none; font-weight: bold; }
DIV.main	{ width: 70em; }
DIV.left 	{ float: left; }
DIV.right 	{ float: left; margin-top: 0; margin-left: 8em; }
PRE.hidden  { display: none; }
PRE.show  	{ display: block; }
</style>

</head><body><div class="main">

<div class="left">
	<ul>
	  <li><a href="#" onclick="showPRE('ftInit');">init</a></li>
	  <li><a href="#" onclick="showPRE('ftClone');">clone</a></li>
	</ul>
	<ul>
	  <li><a href="#" onclick="showPRE('ftAdd');">add</a></li>
	  <li><a href="#" onclick="showPRE('ftStatus');">status</a></li>
	</ul>
</div>

<div class="right">
<pre class="hidden" id="ftInit">
$ git init
</pre>
<pre class="hidden" id="ftClone">
$ git clone git://github.com/schacon/simplegit.git
</pre>

<pre class="hidden" id="ftAdd">
$ git add README helloWorld.java
</pre>
<pre class="hidden" id="ftStatus">
$ git status -s
</pre>

</div>

</div></body>
</html>
